<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Classifier - Orbital Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6",
                        "bg-dark": "#020617",
                    },
                    fontFamily: {
                        display: ["Rajdhani", "sans-serif"],
                        mono: ["Fira Code", "monospace"],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Rajdhani', sans-serif;
        }

        .radial-glow {
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.15);
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.98);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.02);
                opacity: 0.8;
            }

            100% {
                transform: scale(0.98);
                opacity: 0.5;
            }
        }

        .pulse {
            animation: pulse-ring 4s infinite ease-in-out;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #020617;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }

        .recharts-tooltip-wrapper {
            z-index: 10000 !important;
            pointer-events: none !important;
        }
    </style>
    <script type="module" crossorigin src="/dashboard/assets/index-CtPN9PxT.js"></script>
</head>

<body>
    <div id="root"></div>
</body>

</html>

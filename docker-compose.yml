version: '3.8'

services:
  # FastAPI REST API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galaxy-classifier-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    command: python src/api_server.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # Flask Inference Web App Service
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galaxy-classifier-webapp
    ports:
      - "5001:5001"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python src/inference_server.py
    restart: unless-stopped
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

networks:
  default:
    name: galaxy-classifier-network
